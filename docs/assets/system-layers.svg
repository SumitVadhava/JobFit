<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">JobFit System Layers</title>
  <desc id="desc">Layered architecture of frontend, API, services and data stores.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f9fafb"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#334155"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1400" height="820" fill="url(#bg)"/>
  <text x="700" y="58" text-anchor="middle" font-size="34" font-family="Segoe UI, Arial" fill="#0f172a" font-weight="700">JobFit System Structure</text>

  <rect x="130" y="110" width="1140" height="120" rx="16" fill="url(#card)" stroke="#cbd5e1"/>
  <text x="160" y="152" font-size="24" font-family="Segoe UI, Arial" fill="#1e293b" font-weight="700">Presentation Layer</text>
  <text x="160" y="192" font-size="20" font-family="Segoe UI, Arial" fill="#334155">React + Vite, Route Guards, UI Modules, Auth Context</text>

  <rect x="130" y="265" width="1140" height="140" rx="16" fill="url(#card)" stroke="#cbd5e1"/>
  <text x="160" y="310" font-size="24" font-family="Segoe UI, Arial" fill="#1e293b" font-weight="700">Application Layer</text>
  <text x="160" y="348" font-size="20" font-family="Segoe UI, Arial" fill="#334155">Express Routes, Middleware Pipeline, Controller Orchestration</text>
  <text x="160" y="378" font-size="18" font-family="Segoe UI, Arial" fill="#475569">Authentication, Authorization, Validation, Error Handling</text>

  <rect x="130" y="440" width="1140" height="140" rx="16" fill="url(#card)" stroke="#cbd5e1"/>
  <text x="160" y="485" font-size="24" font-family="Segoe UI, Arial" fill="#1e293b" font-weight="700">Domain and Integration Layer</text>
  <text x="160" y="523" font-size="20" font-family="Segoe UI, Arial" fill="#334155">Business Rules: Job Lifecycle, ATS Analysis, Notification Dispatch</text>
  <text x="160" y="553" font-size="18" font-family="Segoe UI, Arial" fill="#475569">External Services: Cloudinary, Google OAuth, OTP Bridge, ATS API</text>

  <rect x="130" y="615" width="1140" height="140" rx="16" fill="url(#card)" stroke="#cbd5e1"/>
  <text x="160" y="660" font-size="24" font-family="Segoe UI, Arial" fill="#1e293b" font-weight="700">Data Layer</text>
  <text x="160" y="698" font-size="20" font-family="Segoe UI, Arial" fill="#334155">MongoDB Collections: users, jobs, applied_jobs, saved_jobs, profiles, atsHistory</text>
  <text x="160" y="728" font-size="18" font-family="Segoe UI, Arial" fill="#475569">Indexed relationships and role-constrained data access</text>

  <line x1="700" y1="230" x2="700" y2="260" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="700" y1="405" x2="700" y2="435" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="700" y1="580" x2="700" y2="610" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
</svg>
