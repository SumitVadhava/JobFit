<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="760" viewBox="0 0 1400 760" role="img" aria-labelledby="title desc">
  <title id="title">Role Collaboration Matrix</title>
  <desc id="desc">Capability matrix for candidate, recruiter and admin personas.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#fff7ed"/>
    </linearGradient>
  </defs>

  <rect width="1400" height="760" fill="url(#bg)"/>
  <text x="700" y="58" text-anchor="middle" font-size="34" font-family="Segoe UI, Arial" fill="#0f172a" font-weight="700">Role Capability Matrix</text>

  <g font-family="Segoe UI, Arial" font-size="20" fill="#1e293b" font-weight="700">
    <text x="180" y="155">Capability</text>
    <text x="760" y="155" text-anchor="middle">Candidate</text>
    <text x="980" y="155" text-anchor="middle">Recruiter</text>
    <text x="1200" y="155" text-anchor="middle">Admin</text>
  </g>

  <g stroke="#cbd5e1" stroke-width="1">
    <line x1="120" y1="180" x2="1280" y2="180"/>
    <line x1="120" y1="250" x2="1280" y2="250"/>
    <line x1="120" y1="320" x2="1280" y2="320"/>
    <line x1="120" y1="390" x2="1280" y2="390"/>
    <line x1="120" y1="460" x2="1280" y2="460"/>
    <line x1="120" y1="530" x2="1280" y2="530"/>
    <line x1="120" y1="600" x2="1280" y2="600"/>
    <line x1="120" y1="670" x2="1280" y2="670"/>

    <line x1="620" y1="120" x2="620" y2="670"/>
    <line x1="840" y1="120" x2="840" y2="670"/>
    <line x1="1060" y1="120" x2="1060" y2="670"/>
  </g>

  <g font-family="Segoe UI, Arial" font-size="18" fill="#334155">
    <text x="150" y="225">Authentication and profile setup</text>
    <text x="150" y="295">Resume upload and ATS analytics</text>
    <text x="150" y="365">Job posting and candidate review</text>
    <text x="150" y="435">Save/apply job workflows</text>
    <text x="150" y="505">Notification and status tracking</text>
    <text x="150" y="575">Job moderation and governance</text>
    <text x="150" y="645">User account administration</text>
  </g>

  <g font-family="Segoe UI, Arial" font-size="28" font-weight="700">
    <text x="760" y="225" text-anchor="middle" fill="#059669">✓</text>
    <text x="980" y="225" text-anchor="middle" fill="#059669">✓</text>
    <text x="1200" y="225" text-anchor="middle" fill="#059669">✓</text>

    <text x="760" y="295" text-anchor="middle" fill="#059669">✓</text>
    <text x="980" y="295" text-anchor="middle" fill="#ef4444">—</text>
    <text x="1200" y="295" text-anchor="middle" fill="#ef4444">—</text>

    <text x="760" y="365" text-anchor="middle" fill="#ef4444">—</text>
    <text x="980" y="365" text-anchor="middle" fill="#059669">✓</text>
    <text x="1200" y="365" text-anchor="middle" fill="#ef4444">—</text>

    <text x="760" y="435" text-anchor="middle" fill="#059669">✓</text>
    <text x="980" y="435" text-anchor="middle" fill="#ef4444">—</text>
    <text x="1200" y="435" text-anchor="middle" fill="#ef4444">—</text>

    <text x="760" y="505" text-anchor="middle" fill="#059669">✓</text>
    <text x="980" y="505" text-anchor="middle" fill="#059669">✓</text>
    <text x="1200" y="505" text-anchor="middle" fill="#059669">✓</text>

    <text x="760" y="575" text-anchor="middle" fill="#ef4444">—</text>
    <text x="980" y="575" text-anchor="middle" fill="#ef4444">—</text>
    <text x="1200" y="575" text-anchor="middle" fill="#059669">✓</text>

    <text x="760" y="645" text-anchor="middle" fill="#ef4444">—</text>
    <text x="980" y="645" text-anchor="middle" fill="#ef4444">—</text>
    <text x="1200" y="645" text-anchor="middle" fill="#059669">✓</text>
  </g>
</svg>
