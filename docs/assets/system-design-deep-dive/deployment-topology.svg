<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Deployment Topology Graph</title>
  <desc id="desc">Deployment topology across internet, frontend hosting, backend hosting, database, and external services.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fbff"/>
      <stop offset="100%" stop-color="#eff6ff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#334155"/>
    </marker>
    <style>
      .title { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 34px; font-weight: 600; fill: #0f172a; }
      .subtitle { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 450; fill: #475569; }
      .node { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 560; fill: #0f172a; }
      .hint { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 450; fill: #64748b; }
      .label { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #334155; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="24" fill="url(#bg)"/>
  <text x="800" y="64" text-anchor="middle" class="title">Deployment Topology Graph</text>
  <text x="800" y="96" text-anchor="middle" class="subtitle">Public edge, service runtime, managed data, and integration dependencies</text>

  <g filter="url(#shadow)">
    <rect x="90" y="170" width="1420" height="640" rx="24" fill="#ffffff" fill-opacity="0.9" stroke="#dbe3f1"/>

    <rect x="150" y="350" width="250" height="100" rx="16" fill="#e2e8f0" stroke="#94a3b8"/>
    <text x="275" y="397" text-anchor="middle" class="node">Public Internet</text>
    <text x="275" y="419" text-anchor="middle" class="hint">Browsers and devices</text>

    <rect x="500" y="260" width="270" height="100" rx="16" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="635" y="307" text-anchor="middle" class="node">Vercel Frontend</text>
    <text x="635" y="329" text-anchor="middle" class="hint">React SPA delivery</text>

    <rect x="500" y="460" width="270" height="100" rx="16" fill="#dcfce7" stroke="#86efac"/>
    <text x="635" y="507" text-anchor="middle" class="node">Render Backend API</text>
    <text x="635" y="529" text-anchor="middle" class="hint">Express service runtime</text>

    <rect x="920" y="230" width="300" height="100" rx="16" fill="#f5f3ff" stroke="#c4b5fd"/>
    <text x="1070" y="277" text-anchor="middle" class="node">MongoDB Atlas</text>
    <text x="1070" y="299" text-anchor="middle" class="hint">Managed operational DB</text>

    <rect x="920" y="390" width="300" height="100" rx="16" fill="#fff7ed" stroke="#fdba74"/>
    <text x="1070" y="437" text-anchor="middle" class="node">Cloudinary</text>
    <text x="1070" y="459" text-anchor="middle" class="hint">Media and resume assets</text>

    <rect x="920" y="550" width="300" height="100" rx="16" fill="#fef9c3" stroke="#fde047"/>
    <text x="1070" y="597" text-anchor="middle" class="node">Google Services</text>
    <text x="1070" y="619" text-anchor="middle" class="hint">OAuth plus OTP mail bridge</text>

    <rect x="1280" y="390" width="190" height="100" rx="16" fill="#ecfccb" stroke="#bef264"/>
    <text x="1375" y="437" text-anchor="middle" class="node">ATS API</text>
    <text x="1375" y="459" text-anchor="middle" class="hint">Analysis model</text>
  </g>

  <g stroke="#334155" stroke-width="2.4" fill="none" marker-end="url(#arrow)">
    <polyline points="400,380 450,380 450,310 500,310"/>
    <polyline points="400,420 450,420 450,510 500,510"/>
    <line x1="635" y1="360" x2="635" y2="460"/>

    <polyline points="770,495 830,495 830,280 920,280"/>
    <polyline points="770,510 845,510 845,440 920,440"/>
    <polyline points="770,525 860,525 860,600 920,600"/>
    <line x1="1220" y1="440" x2="1280" y2="440"/>
  </g>

  <text x="458" y="338" class="label">HTTPS</text>
  <text x="448" y="468" class="label">API calls</text>
  <text x="838" y="292" class="label">data</text>
  <text x="854" y="458" class="label">media</text>
  <text x="872" y="618" class="label">identity and mail</text>
</svg>

