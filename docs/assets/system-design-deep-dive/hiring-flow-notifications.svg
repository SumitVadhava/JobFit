<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-labelledby="title desc">
  <title id="title">Hiring Flow and Notification Side Effects</title>
  <desc id="desc">Clear sequence from recruiter hire action through transactional checks and post-commit side effects.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f6fbff"/>
      <stop offset="100%" stop-color="#eef3ff"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#0f172a" flood-opacity="0.13"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L0,10 L10,5 z" fill="#475569"/>
    </marker>
    <style>
      .title { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 34px; font-weight: 650; fill: #0f172a; }
      .subtitle { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 16px; font-weight: 500; fill: #475569; }
      .section { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 13px; font-weight: 700; fill: #475569; letter-spacing: 0.8px; }
      .boxT { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 15px; font-weight: 600; fill: #0f172a; }
      .small { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 500; fill: #64748b; }
      .arrowLabel { font-family: Manrope, Segoe UI, Arial, sans-serif; font-size: 12px; font-weight: 400; fill: #94a3b8; stroke: none; }
    </style>
  </defs>

  <rect width="1600" height="960" rx="24" fill="url(#bg)"/>
  <text x="800" y="64" text-anchor="middle" class="title">Hiring Flow and Notification Side Effects</text>
  <text x="800" y="95" text-anchor="middle" class="subtitle">One clean path for hiring transaction, then explicit side effects after commit</text>

  <g filter="url(#shadow)">
    <rect x="70" y="130" width="1460" height="760" rx="24" fill="#ffffff" fill-opacity="0.92" stroke="#dbe3f1"/>

    <rect x="110" y="180" width="360" height="660" rx="18" fill="#f8fafc" stroke="#d7e1ee"/>
    <text x="290" y="210" text-anchor="middle" class="section">TRIGGER</text>

    <rect x="500" y="180" width="500" height="660" rx="18" fill="#f8fafc" stroke="#d7e1ee"/>
    <text x="750" y="210" text-anchor="middle" class="section">TRANSACTIONAL CORE</text>

    <rect x="1030" y="180" width="450" height="660" rx="18" fill="#f8fafc" stroke="#d7e1ee"/>
    <text x="1255" y="210" text-anchor="middle" class="section">POST-COMMIT SIDE EFFECTS</text>

    <rect x="150" y="280" width="280" height="90" rx="14" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="290" y="320" text-anchor="middle" class="boxT">Recruiter clicks Hire</text>
    <text x="290" y="341" text-anchor="middle" class="small">selected candidate + job reference</text>

    <rect x="560" y="280" width="380" height="90" rx="14" fill="#dbeafe" stroke="#93c5fd"/>
    <text x="750" y="320" text-anchor="middle" class="boxT">Load candidate and opening state</text>
    <text x="750" y="341" text-anchor="middle" class="small">validate current records before write</text>

    <polygon points="640,430 860,430 920,490 860,550 640,550 580,490" fill="#fff7ed" stroke="#fdba74"/>
    <text x="750" y="495" text-anchor="middle" class="boxT">Openings greater than zero?</text>

    <rect x="1060" y="330" width="390" height="86" rx="14" fill="#fee2e2" stroke="#fca5a5"/>
    <text x="1255" y="370" text-anchor="middle" class="boxT">Abort transaction and return 409</text>
    <text x="1255" y="391" text-anchor="middle" class="small">no mutation is persisted</text>

    <rect x="560" y="610" width="380" height="96" rx="14" fill="#dcfce7" stroke="#86efac"/>
    <text x="750" y="648" text-anchor="middle" class="boxT">Write transaction</text>
    <text x="750" y="669" text-anchor="middle" class="small">candidate status = hired</text>
    <text x="750" y="689" text-anchor="middle" class="small">openings = openings - 1</text>

    <polygon points="1165,470 1345,470 1405,530 1345,590 1165,590 1105,530" fill="#fef9c3" stroke="#facc15"/>
    <text x="1255" y="536" text-anchor="middle" class="boxT">Openings now zero?</text>

    <rect x="1060" y="640" width="390" height="86" rx="14" fill="#dcfce7" stroke="#86efac"/>
    <text x="1255" y="678" text-anchor="middle" class="boxT">Commit success response</text>
    <text x="1255" y="699" text-anchor="middle" class="small">hired candidate is finalized</text>

    <rect x="1080" y="760" width="180" height="70" rx="12" fill="#ede9fe" stroke="#c4b5fd"/>
    <text x="1170" y="801" text-anchor="middle" class="boxT">Close job</text>

    <rect x="1280" y="760" width="180" height="70" rx="12" fill="#e0e7ff" stroke="#a5b4fc"/>
    <text x="1370" y="801" text-anchor="middle" class="boxT">Notify others</text>

    <rect x="1180" y="860" width="280" height="70" rx="12" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="1320" y="901" text-anchor="middle" class="boxT">Cleanup pending applications</text>
  </g>

  <g stroke="#475569" stroke-width="2.6" fill="none" marker-end="url(#arrow)">
    <line x1="430" y1="325" x2="560" y2="325"/>
    <line x1="750" y1="370" x2="750" y2="430"/>

    <polyline points="920,490 980,490 980,373 1060,373"/>
    <text x="980" y="476" class="arrowLabel">No</text>

    <line x1="750" y1="550" x2="750" y2="610"/>
    <text x="766" y="584" class="arrowLabel">Yes</text>

    <polyline points="940,658 1045,658 1045,530 1105,530"/>
    <line x1="1255" y1="590" x2="1255" y2="640"/>
    <polyline points="1405,530 1490,530 1490,745 1170,745 1170,760"/>

    <line x1="1260" y1="775" x2="1280" y2="775"/>

    <polyline points="1370,830 1370,845 1320,845 1320,860"/>
  </g>

  <text x="1270" y="622" class="arrowLabel">No</text>
  <text x="1420" y="520" class="arrowLabel">Yes</text>

  <rect x="530" y="250" width="440" height="500" rx="18" fill="none" stroke="#94a3b8" stroke-dasharray="8 7"/>
  <text x="750" y="772" text-anchor="middle" class="small">Atomic transaction boundary</text>
</svg>

