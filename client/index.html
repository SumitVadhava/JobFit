    <title>JobFit</title>
    <style>
      @keyframes slide-in-out {
        0% {
          transform: translateY(100px);
          opacity: 0;
        }

        10% {
          transform: translateY(0);
          opacity: 1;
        }

        90% {
          transform: translateY(0);
          opacity: 1;
        }

        100% {
          transform: translateY(100px);
          opacity: 0;
        }
      }

      .animate-slide-in-out {
        animation: slide-in-out 3s ease-in-out;
      }

      @keyframes fade-in {
        from {
          opacity: 0;
        }

        to {
          opacity: 1;
        }
      }

      .animate-fade-in {
        animation: fade-in 0.3s ease-in;
      }
    </style>
